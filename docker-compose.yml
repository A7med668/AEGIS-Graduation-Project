x-common-env: &common-env
  AEGIS_BACKEND_DATABASE_URL: ${AEGIS_BACKEND_DATABASE_URL}
  AEGIS_ANALYST_TOKENS: ${AEGIS_ANALYST_TOKENS}
  AEGIS_ACCEPTED_ENROLLMENT_TOKENS: ${AEGIS_ACCEPTED_ENROLLMENT_TOKENS}
  AEGIS_KAFKA_BOOTSTRAP_SERVERS: ${AEGIS_KAFKA_BOOTSTRAP_SERVERS}
  AEGIS_REDIS_URL: ${AEGIS_REDIS_URL}
  AEGIS_PROCESS_INLINE: "false"
  AEGIS_EVENT_PUBLISHER: kafka
  AEGIS_API_URL: ${AEGIS_API_URL}
  AEGIS_RAW_PAYLOAD_DIR: ${AEGIS_RAW_PAYLOAD_DIR}
  AEGIS_LOCAL_LLM_PROVIDER: ${AEGIS_LOCAL_LLM_PROVIDER:-stub}
  AEGIS_LOCAL_LLM_BASE_URL: ${AEGIS_LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434}
  AEGIS_LOCAL_LLM_TIMEOUT_SECONDS: ${AEGIS_LOCAL_LLM_TIMEOUT_SECONDS:-90}
  AEGIS_LOGS_MODEL: ${AEGIS_LOGS_MODEL:-llama3:latest}
  AEGIS_TELEMETRY_MODEL: ${AEGIS_TELEMETRY_MODEL:-llama3:latest}
  AEGIS_RISK_MODEL: ${AEGIS_RISK_MODEL:-llama3:latest}
  AEGIS_SHIELDY_EMBEDDING_MODEL: ${AEGIS_SHIELDY_EMBEDDING_MODEL:-nomic-embed-text:latest}
  AEGIS_SHIELDY_RAG_MODEL: ${AEGIS_SHIELDY_RAG_MODEL:-mistral:latest}
  AEGIS_SHIELDY_RAG_TOP_K: ${AEGIS_SHIELDY_RAG_TOP_K:-5}
  LOG_LEVEL: ${LOG_LEVEL}

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    ports: ["2181:2181"]
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "echo srvr | nc -w 2 localhost 2181 | grep -q 'Zookeeper version' || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    ports: ["9092:9092"]
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend/
      dockerfile: Dockerfile.api
    restart: unless-stopped
    ports: ["8080:8080"]
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
      AEGIS_SHIELDY_VECTOR_DB_PATH: /app/app/shieldy/Data/Vector_Database_v2
      AEGIS_SHIELDY_VECTOR_COLLECTION: security_assistant_v2
      AEGIS_SHIELDY_RAG_TOP_K: "5"
      AEGIS_SHIELDY_MAX_CONTEXT_CHARS: "6000"
      AEGIS_SHIELDY_RAG_MIN_RELEVANCE: "0.03"
      AEGIS_SHIELDY_WEB_SEARCH_MAX_RESULTS: "5"
      AEGIS_SHIELDY_WEB_SEARCH_TIMEOUT_SECONDS: "30"
    volumes:
      - rawdata:/data/raw-payloads
      - ./backend/app/shieldy/Data:/app/app/shieldy/Data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; exit(0 if urllib.request.urlopen('http://localhost:8080/health').status == 200 else 1)\""]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s


  consumer:
    build:
      context: ./backend/
      dockerfile: deploy/Dockerfile.consumer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment: *common-env
    volumes:
      - rawdata:/data/raw-payloads
    healthcheck:
      test: ["CMD", "python", "-c", "import os,sys; sys.exit(0 if os.path.exists('/proc/self') else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  dashboard:
    build:
      context: ./frontend/
      dockerfile: Dockerfile
      args:
        VITE_AEGIS_API_URL: /api/v1
        VITE_APP_BASE: /dashboard/
    restart: unless-stopped
    ports: ["5173:80"]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    ports: ["5050:5050"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadata:/var/lib/pgadmin

  redisinsight:
    image: redis/redisinsight:latest
    restart: unless-stopped
    ports: ["5540:5540"]
    depends_on:
      redis:
        condition: service_healthy

  apk-studio-api:
    build:
      context: ./apk-studio/
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ./apk-studio/.env.example
    environment:
      STORAGE_DIR: /workspace/apk-studio/storage
      DATABASE_PATH: /workspace/apk-studio/storage/aegis.db
      ROOT_PATH: /apk-api
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      CORS_ORIGINS: http://localhost,http://127.0.0.1,http://localhost/apk-studio
      ADB_SERVER_SOCKET: tcp:host.docker.internal:5037
      DYNAMIC_ADB_SERIAL: emulator-5554
      DYNAMIC_AVD_NAME: Medium_Phone_API_36.1
      DYNAMIC_AUTO_START_EMULATOR: "false"
      JADX_MAX_HEAP_MB: "768"
      JADX_GC_THREADS: "1"
      STATIC_JADX_THREADS: "1"
      STATIC_JADX_TIMEOUT_SECONDS: "170"
      OPERATIONAL_DB_ENABLED: "false"
    ports: ["8000:8000"]
    volumes:
      - ./apk-studio/storage:/workspace/apk-studio/storage
      - ./apk-studio/evaluation_dataset:/workspace/apk-studio/evaluation_dataset
      - C:/Tools:/opt/aegis-tools:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      default:
        aliases:
          - backend
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  apk-studio-ui:
    build:
      context: ./apk-studio/frontend/
      args:
        VITE_APP_BASE: /apk-studio/
        VITE_API_BASE: /apk-api
    restart: unless-stopped
    ports: ["5174:80"]
    depends_on:
      apk-studio-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/apk-studio/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

  seed:
    build:
      context: ./backend/
      dockerfile: Dockerfile.api
    restart: "no"
    depends_on:
      api:
        condition: service_healthy
    environment: *common-env
    entrypoint: ["python", "-m", "app.seed_demo"]
    profiles:
      - seed

  kafdrop:
    image: obsidiandynamics/kafdrop:latest
    restart: unless-stopped
    ports: ["9000:9000"]
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
      SERVER_SERVLET_CONTEXTPATH: /kafka-ui

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports: ["80:80"]
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  pgadata:
  rawdata:
