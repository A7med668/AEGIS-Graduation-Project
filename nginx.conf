resolver 127.0.0.11 valid=10s;

server {
    listen 80;
    client_max_body_size 300M;

    set $api_upstream http://api:8080;
    set $dashboard_upstream http://dashboard:80;
    set $apk_studio_api_upstream http://apk-studio-api:8000;
    set $apk_studio_ui_upstream http://apk-studio-ui:80;

    set $pgadmin_upstream http://pgadmin:80;
    set $kafdrop_upstream http://kafdrop:9000;
    set $redisinsight_upstream http://redisinsight:5540;

    location /health {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /admin {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /admin/ {
        return 301 $scheme://$http_host/admin;
    }

    location = /dashboard {
        return 301 $scheme://$http_host/dashboard/;
    }

    location /dashboard/ {
        rewrite ^/dashboard/?(.*)$ /$1 break;
        proxy_pass $dashboard_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /docs {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 600s;
    }

    location /api/ {
        proxy_pass $redisinsight_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /apk-studio {
        return 301 $scheme://$http_host/apk-studio/;
    }

    location /apk-studio/ {
        proxy_pass $apk_studio_ui_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    location = /apk-api {
        return 301 $scheme://$http_host/apk-api/api/health;
    }

    location /apk-api/ {
        rewrite ^/apk-api(/.*)$ $1 break;
        proxy_pass $apk_studio_api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
    }


    location = /pgadmin {
        return 301 $scheme://$http_host/pgadmin/;
    }

    location /pgadmin/ {
        rewrite ^/pgadmin(/.*)$ $1 break;
        proxy_pass $pgadmin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Script-Name /pgadmin;
    }

    location = /kafka-ui {
        return 301 $scheme://$http_host/kafka-ui/;
    }

    location /kafka-ui/ {
        proxy_pass $kafdrop_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location = /redis {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        return 302 http://localhost:5540/;
    }

    location /redis/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        return 302 http://localhost:5540/;
    }

    location = /not-found {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        return 302 http://localhost:5540/;
    }

    location ~ ^/(databases|browser|workbench|settings|rdi|pub-sub)(/|$) {
        proxy_pass $redisinsight_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /assets/ {
        proxy_pass $redisinsight_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /socket.io/ {
        proxy_pass $redisinsight_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ~ ^/favicon.*\.(png|ico)$ {
        proxy_pass $redisinsight_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        return 301 $scheme://$host/dashboard/;
    }
}
