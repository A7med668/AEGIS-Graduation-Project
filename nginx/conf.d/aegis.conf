server {
    listen 80;
    server_name localhost;

    client_max_body_size 500M;

    location = / {
        return 302 /admin/;
    }

    location = /dashboard {
        return 301 /dashboard/;
    }

    location /dashboard/ {
        proxy_pass http://host.docker.internal:5173/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /assets/ {
        proxy_pass http://host.docker.internal:5173/assets/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/ {
        proxy_pass http://host.docker.internal:8080/api/;
        proxy_http_version 1.1;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;

        proxy_buffering off;
        proxy_request_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /docs {
        proxy_pass http://host.docker.internal:8080/docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://host.docker.internal:8080/openapi.json;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /health {
        proxy_pass http://host.docker.internal:8080/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        root /usr/share/nginx/html;
        try_files /admin.html =404;
    }

    location = /kafka-ui {
        return 301 /kafka-ui/;
    }

    location /kafka-ui/ {
        proxy_pass http://aegis-kafdrop:9000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /kafka-ui;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /redis {
        return 301 /redis/;
    }

    location /redis/ {
        proxy_pass http://aegis-redisinsight:5540/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Prefix /redis;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /pgadmin {
        return 301 /pgadmin/;
    }

    location /pgadmin/ {
        proxy_pass http://aegis-pgadmin:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Script-Name /pgadmin;
        proxy_set_header X-Scheme $scheme;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Kafdrop static assets
    location /css/ {
        proxy_pass http://aegis-kafdrop:9000/css/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /js/ {
        proxy_pass http://aegis-kafdrop:9000/js/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /images/ {
        proxy_pass http://aegis-kafdrop:9000/images/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /webjars/ {
        proxy_pass http://aegis-kafdrop:9000/webjars/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location = /favicon.ico {
        proxy_pass http://aegis-kafdrop:9000/favicon.ico;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # Vite dev server routes for React dashboard
    location /@vite/ {
        proxy_pass http://host.docker.internal:5173/@vite/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /@react-refresh {
        proxy_pass http://host.docker.internal:5173/@react-refresh;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /src/ {
        proxy_pass http://host.docker.internal:5173/src/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /node_modules/ {
        proxy_pass http://host.docker.internal:5173/node_modules/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /vite.svg {
        proxy_pass http://host.docker.internal:5173/vite.svg;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }
}