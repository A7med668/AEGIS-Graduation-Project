events {
    worker_connections 1024;
}

http {
    # Security headers applied to all responses
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header X-Frame-Options         "SAMEORIGIN"         always;
    add_header X-XSS-Protection        "1; mode=block"      always;
    add_header Referrer-Policy         "strict-origin"      always;

    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # HTTPS frontend + API proxy
    server {
        listen 443 ssl;
        server_name _;

        # ── TLS ──────────────────────────────────────────────────────────────
        # Place your certificate and key at the paths below.
        # For local dev, generate a self-signed cert:
        #   openssl req -x509 -newkey rsa:4096 -keyout certs/aegis.key \
        #     -out certs/aegis.crt -sha256 -days 365 -nodes \
        #     -subj "/CN=localhost"
        ssl_certificate     /etc/nginx/certs/aegis.crt;
        ssl_certificate_key /etc/nginx/certs/aegis.key;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # ── API proxy ─────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://api:8080/api/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
        }

        location /health {
            proxy_pass         http://api:8080/health;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
        }

        # ── Dashboard ─────────────────────────────────────────────────────────
        location / {
            proxy_pass         http://dashboard:80/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
