services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep imok"]
      interval: 5s
      timeout: 5s
      retries: 10

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    depends_on:
      zookeeper:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 15

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
      dashboard:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    environment:
      AEGIS_BACKEND_DATABASE_URL: ${AEGIS_BACKEND_DATABASE_URL:-postgresql+psycopg://aegis:aegis@postgres:5432/aegis}
      AEGIS_RAW_PAYLOAD_DIR: /data/raw-payloads
      AEGIS_ACCEPTED_ENROLLMENT_TOKENS: ${AEGIS_ACCEPTED_ENROLLMENT_TOKENS:-sample-token}
      AEGIS_ANALYST_TOKENS: ${AEGIS_ANALYST_TOKENS:-sample-token}
      AEGIS_PROCESS_INLINE: "false"
      AEGIS_EVENT_PUBLISHER: kafka
      AEGIS_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AEGIS_KAFKA_TELEMETRY_TOPIC: telemetry_events
      AEGIS_LOCAL_LLM_PROVIDER: ${AEGIS_LOCAL_LLM_PROVIDER:-stub}
      AEGIS_LOCAL_LLM_BASE_URL: ${AEGIS_LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434}
      AEGIS_LOGS_MODEL: ${AEGIS_LOGS_MODEL:-llama3:latest}
      AEGIS_TELEMETRY_MODEL: ${AEGIS_TELEMETRY_MODEL:-llama3:latest}
      AEGIS_RISK_MODEL: ${AEGIS_RISK_MODEL:-llama3:latest}
      AEGIS_LOCAL_LLM_TIMEOUT_SECONDS: ${AEGIS_LOCAL_LLM_TIMEOUT_SECONDS:-120}
      AEGIS_CORS_ALLOWED_ORIGINS: ${AEGIS_CORS_ALLOWED_ORIGINS:-http://127.0.0.1:5173,http://localhost:5173}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      AEGIS_GOOGLE_PLAY_INTEGRITY_API_KEY: ${AEGIS_GOOGLE_PLAY_INTEGRITY_API_KEY:-}
      AEGIS_GOOGLE_PLAY_INTEGRITY_PACKAGE_NAME: ${AEGIS_GOOGLE_PLAY_INTEGRITY_PACKAGE_NAME:-}
      AEGIS_REDIS_URL: redis://redis:6379/0
    volumes:
      - backend-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.consumer
    restart: unless-stopped
    environment:
      AEGIS_BACKEND_DATABASE_URL: ${AEGIS_BACKEND_DATABASE_URL:-postgresql+psycopg://aegis:aegis@postgres:5432/aegis}
      AEGIS_RAW_PAYLOAD_DIR: /data/raw-payloads
      AEGIS_EVENT_PUBLISHER: kafka
      AEGIS_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AEGIS_KAFKA_TELEMETRY_TOPIC: telemetry_events
      AEGIS_LOCAL_LLM_PROVIDER: ${AEGIS_LOCAL_LLM_PROVIDER:-stub}
      AEGIS_LOCAL_LLM_BASE_URL: ${AEGIS_LOCAL_LLM_BASE_URL:-http://host.docker.internal:11434}
      AEGIS_LOGS_MODEL: ${AEGIS_LOGS_MODEL:-llama3:latest}
      AEGIS_TELEMETRY_MODEL: ${AEGIS_TELEMETRY_MODEL:-llama3:latest}
      AEGIS_RISK_MODEL: ${AEGIS_RISK_MODEL:-llama3:latest}
      AEGIS_LOCAL_LLM_TIMEOUT_SECONDS: ${AEGIS_LOCAL_LLM_TIMEOUT_SECONDS:-120}
      AEGIS_GOOGLE_PLAY_INTEGRITY_API_KEY: ${AEGIS_GOOGLE_PLAY_INTEGRITY_API_KEY:-}
      AEGIS_GOOGLE_PLAY_INTEGRITY_PACKAGE_NAME: ${AEGIS_GOOGLE_PLAY_INTEGRITY_PACKAGE_NAME:-}
    volumes:
      - backend-data:/data
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  dashboard:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        VITE_AEGIS_API_URL: ${VITE_AEGIS_API_URL:-http://127.0.0.1:8080/api/v1}
    ports:
      - "5173:80"
    depends_on:
      - api

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aegis -d aegis"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  backend-data:
  postgres-data:
  kafka-data:
  zookeeper-data:
  zookeeper-log:
