services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env.production.example
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers
    volumes:
      - aegis_storage:/data/aegis/storage
    restart: unless-stopped
    networks:
      - aegis_net

  frontend:
    build:
      context: ./frontend
    environment:
      - VITE_API_BASE=
    restart: unless-stopped
    networks:
      - aegis_net

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - backend
      - frontend
    ports:
      - "8080:80"
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    networks:
      - aegis_net

volumes:
  aegis_storage:

networks:
  aegis_net:
    driver: bridge
